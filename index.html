<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #eff3f7;
      color: #102a43;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 35%),
                  radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.12), transparent 25%),
                  linear-gradient(180deg, #f7fbfd 0%, #e9eff6 100%);
    }

    .todo-app {
      width: min(100%, 520px);
      padding: 2rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.16);
      backdrop-filter: blur(18px);
    }

    .todo-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .todo-header p {
      margin: 0.75rem auto 0;
      max-width: 340px;
      color: #475569;
      line-height: 1.6;
    }

    .todo-header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.25vw, 2.75rem);
      letter-spacing: -0.04em;
    }

    .todo-input-group {
      display: grid;
      gap: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .todo-input {
      width: 100%;
      border: 1px solid #d2dce6;
      border-radius: 1.1rem;
      padding: 1rem 1.1rem;
      font-size: 1rem;
      color: #102a43;
      background: #f8fbff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .todo-input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.14);
      background: #ffffff;
    }

    .todo-submit {
      width: 100%;
      border: none;
      border-radius: 1.1rem;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 14px 30px rgba(59, 130, 246, 0.2);
    }

    .todo-submit:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 18px 34px rgba(59, 130, 246, 0.22);
    }

    .todo-controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .todo-controls button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.8rem 1.2rem;
      background: #f8fafc;
      color: #334155;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }

    .todo-controls button:hover {
      background: #eff6ff;
      color: #1d4ed8;
      transform: translateY(-1px);
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.85rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border-radius: 1.1rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .task-item:hover {
      transform: translateY(-1px);
      border-color: #cbd5e1;
    }

    .task-item span {
      color: #1e293b;
      font-size: 1rem;
      line-height: 1.5;
    }

    .task-item.completed span {
      color: #6b7280;
      text-decoration: line-through;
    }

    .task-action {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.95rem;
    }

    .task-action button {
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .task-action button:hover {
      color: #1d4ed8;
    }

    @media (max-width: 520px) {
      .todo-app {
        padding: 1.5rem;
      }

      .todo-controls {
        gap: 0.5rem;
      }

      .task-item {
        flex-direction: column;
        align-items: stretch;
      }

      .task-action {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="todo-app" aria-label="Todo App">
    <header class="todo-header">
      <h1>Todo App</h1>
    </header>

    <section class="todo-input-group">
      <label for="new-task" class="sr-only">New task</label>
      <input id="new-task" class="todo-input" type="text" placeholder="Add a new task" />
      <button type="button" class="todo-submit">Add</button>
    </section>

    <section class="todo-controls" aria-label="Task filters">
      <button type="button">All</button>
      <button type="button">Active</button>
      <button type="button">Completed</button>
    </section>

    <section>
      <ul class="task-list" aria-label="Task list">
        <li class="task-item">
          <span>Write a clean modern Todo UI</span>
          <div class="task-action">
            <button type="button">Complete</button>
          </div>
        </li>
        <li class="task-item completed">
          <span>Review design requirements</span>
          <div class="task-action">
            <button type="button">Completed</button>
          </div>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
