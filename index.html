<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="todo-app" aria-label="Todo App">
    <header class="todo-header">
      <h1>Todo App</h1>
    </header>

    <section class="todo-input-group">
      <label for="new-task" class="sr-only">New task</label>
      <input id="new-task" class="todo-input" type="text" placeholder="Add a new task" />
      <button type="button" class="todo-submit">Add</button>
    </section>

    <section class="todo-controls" aria-label="Task filters">
      <button type="button">All</button>
      <button type="button">Active</button>
      <button type="button">Completed</button>
    </section>

    <section>
      <ul class="task-list" aria-label="Task list"></ul>
    </section>
  </main>

  <script src="todo-app.js"></script>
</body>
</html>
